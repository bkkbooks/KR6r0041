body:
  text: 琳法師別傳序隴西處士李懷琳撰詳夫太極元氣之初三光尚匿木皇火帝之後八卦爰興是知仁義漸開假龍圖而起字道德云廢因鳥迹以成書所以左史記言夏商備於誥誓右史記事唐虞流於典謨暨乃史遷綴史記之文班固嗣班彪之作英雄高士耆舊逸人傳記之興其來尚矣況乎法雲佛日無去無來妙有真空離生離滅雖復至理凝湛而事迹應權所以誕相西陲周王矚五光之彩流兆東夏漢帝夢丈六之容於是慷慨摩騰應群機而入洛抑揚僧會體大道以遊吳代有其人英雄間發爰有襄陽釋法琳者紹迹四依應生五濁總八藏於襟腑包九流於胸臆維絶紐之將弛纂龍樹之前徽正頽綱之已紊嗣馬鳴之餘烈至若直言不諱等折檻於朱雲有犯無隱邁牽衣於王象觸龍鱗而不移其志諒疾風之徑草焉冒嚴刑而不改其節實季葉之忠臣也然其文言博雅秦懸一字無以方事理弘敷蜀挂千金未足比嗟乎儒釋君子鮮味斯道信哉曲高和寡幾將湮滅者歟爰有弘福寺琮上人者稟氣星辰體道乘羊之歲資靈海嶽育德撫象之年志等澄蘭誓摧邪而納慮器均安遠弘正教以為心至若持線金章貫花玉牒妙窮宗致曲盡幽微然而聽覽之餘遊情子史綜括黃老包吞儒墨每以琳公雅作分散者多詢諸耆舊勒成卷軸分為上中下目之為別傳理致周備捃托無遺刪補有則抑亦僧中之良史也然而記詞記事班馬擬以多慚直筆直言陳范方之有愧始驗琳公之草創唯著美於一時上人之潤色乃規模於萬葉弟子狄道李懷琳與琮上人志叶金蘭義符膠漆雖緇素有隔而嗅味頗同爰因頂謁遇觀寶聚輒申狂簡為之序引云爾
